name: Build VS Code Extension

on:
  workflow_dispatch:
  push:
    paths:
      - 'vscode/**'
      - '.github/workflows/build-vscode.yml'
  pull_request:
    paths:
      - 'vscode/**'
      - '.github/workflows/build-vscode.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: vscode

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json

      - name: Set version
        id: version
        run: echo "version=0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Bump version in package.json
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --allow-missing-repository

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-code-review-vscode-${{ steps.version.outputs.version }}
          path: vscode/*.vsix

      - name: Create release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vscode-v${{ steps.version.outputs.version }}
          name: VS Code Extension v${{ steps.version.outputs.version }}
          files: vscode/*.vsix
          generate_release_notes: true

      - name: Update README with latest version
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DOWNLOAD_URL="https://github.com/mystictraveler/copilot-code-review-plugins/releases/download/vscode-v${VERSION}/copilot-code-review-${VERSION}.vsix"
          sed -i "/LATEST_RELEASES_START/,/LATEST_RELEASES_END/s#| VS Code |.*#| VS Code | v${VERSION} | [copilot-code-review-${VERSION}.vsix](${DOWNLOAD_URL}) |#" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "Update VS Code download link to v${VERSION} [skip ci]" && git push)
