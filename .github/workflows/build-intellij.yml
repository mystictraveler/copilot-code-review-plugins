name: Build IntelliJ Plugin

on:
  push:
    paths:
      - 'intellij/**'
      - '.github/workflows/build-intellij.yml'
  pull_request:
    paths:
      - 'intellij/**'
      - '.github/workflows/build-intellij.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intellij

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: List Copilot plugin classes
        run: |
          ./gradlew prepareJarSearchableOptions 2>/dev/null || true
          find ~/.gradle/caches -name "*.jar" -path "*copilot*" 2>/dev/null | head -5 | while read jar; do
            echo "=== JAR: $jar ==="
            jar tf "$jar" | grep -E "\.class$" | grep -iv "META-INF" | sed 's/\.class$//' | sed 's/\//./g' | head -100
          done

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-code-review-intellij
          path: intellij/build/distributions/*.zip
