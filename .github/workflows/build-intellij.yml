name: Build IntelliJ Plugin

on:
  workflow_dispatch:
  push:
    paths:
      - 'intellij/**'
      - '.github/workflows/build-intellij.yml'
  pull_request:
    paths:
      - 'intellij/**'
      - '.github/workflows/build-intellij.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set version
        id: version
        run: echo "version=0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Bump version in build.gradle.kts
        working-directory: intellij
        run: sed -i "s/version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" build.gradle.kts

      - name: Clone and build LM API dependency
        run: |
          git clone https://github.com/mystictraveler/intellij-lm-api.git ../intellij-lm-api
          cd ../intellij-lm-api
          ./gradlew buildPlugin

      - name: Build plugin
        working-directory: intellij
        run: ./gradlew buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-code-review-intellij-${{ steps.version.outputs.version }}
          path: intellij/build/distributions/*.zip

      - name: Create release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: intellij-v${{ steps.version.outputs.version }}
          name: IntelliJ Plugin v${{ steps.version.outputs.version }}
          files: intellij/build/distributions/*.zip
          generate_release_notes: true

      - name: Update README with latest version
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DOWNLOAD_URL="https://github.com/mystictraveler/copilot-code-review-plugins/releases/download/intellij-v${VERSION}/copilot-code-review-${VERSION}.zip"
          sed -i "/LATEST_RELEASES_START/,/LATEST_RELEASES_END/s#| IntelliJ |.*#| IntelliJ | v${VERSION} | [copilot-code-review-${VERSION}.zip](${DOWNLOAD_URL}) |#" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "Update IntelliJ download link to v${VERSION} [skip ci]" && git push)
