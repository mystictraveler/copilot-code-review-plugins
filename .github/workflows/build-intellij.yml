name: Build IntelliJ Plugin

on:
  push:
    paths:
      - 'intellij/**'
      - '.github/workflows/build-intellij.yml'
  pull_request:
    paths:
      - 'intellij/**'
      - '.github/workflows/build-intellij.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Clone and build LM API dependency
        run: |
          git clone https://github.com/mystictraveler/intellij-lm-api.git ../intellij-lm-api
          cd ../intellij-lm-api
          ./gradlew buildPlugin

      - name: Build plugin
        working-directory: intellij
        run: ./gradlew buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-code-review-intellij
          path: intellij/build/distributions/*.zip
