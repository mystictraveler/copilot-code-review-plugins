name: Build Eclipse Plugin

on:
  push:
    paths:
      - 'eclipse/**'
      - '.github/workflows/build-eclipse.yml'
  pull_request:
    paths:
      - 'eclipse/**'
      - '.github/workflows/build-eclipse.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eclipse

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build plugin
        run: mvn clean verify -B

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-code-review-eclipse
          path: eclipse/target/*.jar
